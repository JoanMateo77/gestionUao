version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reservas_db
    environment:
      POSTGRES_USER: reservas_user
      POSTGRES_PASSWORD: reservas_pass
      POSTGRES_DB: reservas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas_user -d reservas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
